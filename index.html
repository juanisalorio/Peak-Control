<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PEAK">
<title>PEAK Control</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bosque:#1F2022;--hueso:#F3F1EA;--menta:#00E09A;--lavanda:#B38CFF;--border:#E0DDD6;--muted:#8A8880;--rojo:#E24B4A;--verde:#00A878;--naranja:#FF9800;--ff:'Montserrat',-apple-system,sans-serif}
body{font-family:var(--ff);background:var(--hueso);color:var(--bosque);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px}
.hdr{background:var(--bosque);padding:18px 18px 12px}
.hdr-top{display:flex;align-items:center;gap:10px}
.logo-t{letter-spacing:.5em;font-size:20px;font-weight:700;color:var(--hueso);text-indent:.5em;line-height:1}
.logo-s{font-size:7px;color:rgba(243,241,234,.3);letter-spacing:.2em;margin-top:2px;text-indent:.2em}
.hdr-caja{margin-left:auto;text-align:right}
.caja-big{font-size:19px;font-weight:700;color:var(--hueso)}
.caja-usd{font-size:10px;color:rgba(243,241,234,.45);margin-top:1px}
.hdr-user{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:7px;border-top:1px solid rgba(255,255,255,.08)}
.hdr-hi{font-size:9px;color:rgba(243,241,234,.45);letter-spacing:.08em}
.hdr-hi strong{color:var(--menta)}
.hdr-btns{display:flex;gap:6px;align-items:center}
.btn-sm{background:rgba(255,255,255,.08);border:none;color:rgba(243,241,234,.4);font-size:9px;padding:3px 7px;border-radius:8px;cursor:pointer;font-family:var(--ff);letter-spacing:.06em}
.sync-bar{font-size:7.5px;color:rgba(255,255,255,.18);text-align:center;letter-spacing:.1em;min-height:13px;display:flex;align-items:center;justify-content:center;gap:4px;margin-top:5px}
.sync-err{color:rgba(226,75,74,.8)!important}
.dot{width:5px;height:5px;border-radius:50%;background:var(--menta);animation:blink 1s infinite;flex-shrink:0}
.dot-err{background:var(--rojo)!important}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;overflow-x:auto}
.tab{flex:1;min-width:0;padding:10px 2px;border:none;background:none;cursor:pointer;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-family:var(--ff);color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--bosque);border-bottom:2px solid var(--bosque)}
.content{padding:14px;padding-bottom:20px}
.card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px;margin-bottom:12px}
.card-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--bosque);margin-bottom:10px}
.flbl{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.1em;display:block;margin-bottom:4px;font-weight:600}
.finp{width:100%;padding:10px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--hueso);color:var(--bosque);font-family:var(--ff);margin-bottom:10px}
.finp:focus{outline:none;border-color:var(--bosque)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.frow .finp{margin-bottom:0}
.tbts{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.tbt{flex:1;min-width:0;padding:9px 4px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:var(--ff);white-space:nowrap;text-align:center}
.tbt.sp{background:var(--menta);color:var(--bosque);border-color:var(--menta)}
.tbt.sr{background:var(--lavanda);color:#fff;border-color:var(--lavanda)}
.tbt.sa{background:var(--border);color:var(--bosque);border-color:var(--border)}
.tbt.sg{background:var(--verde);color:#fff;border-color:var(--verde)}
.tbt.son{background:var(--bosque);color:var(--hueso);border-color:var(--bosque)}
.btn-add{width:100%;padding:12px;background:var(--bosque);color:var(--menta);border:none;border-radius:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;cursor:pointer;font-family:var(--ff);margin-bottom:12px;display:block}
.btn-save{width:100%;padding:12px;background:var(--bosque);color:var(--menta);border:none;border-radius:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;cursor:pointer;font-family:var(--ff);margin-top:4px}
.btn-x{background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;line-height:1;padding:0 4px}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--border);font-size:15px;padding:2px 3px;line-height:1}
.err{font-size:12px;color:var(--rojo);padding:7px 10px;background:#FCEBEB;border-radius:6px;margin-bottom:8px}
.kpi-hero{background:var(--bosque);border-radius:10px;padding:16px;margin-bottom:12px;text-align:center}
.kpi-hero-lbl{font-size:9px;color:rgba(243,241,234,.45);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.kpi-hero-val{font-size:36px;font-weight:700;color:#fff;line-height:1}
.kpi-hero-usd{font-size:12px;color:rgba(243,241,234,.4);margin-top:4px}
.kpi-hero-runway{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.08em}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:#fff;border-radius:10px;border:1px solid var(--border);padding:12px}
.kpi-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.kpi-val{font-size:17px;font-weight:700;color:var(--bosque);line-height:1.1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:3px}
.kpi-delta{font-size:10px;font-weight:700;margin-top:2px}
.delta-up{color:var(--verde)}
.delta-dn{color:var(--rojo)}
.alert{border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;line-height:1.5;display:flex;align-items:flex-start;gap:8px}
.alert-w{background:#FFF3CD;border:1px solid #FFD700;color:#7A6000}
.alert-r{background:#FCEBEB;border:1px solid var(--rojo);color:#8B0000}
.alert-g{background:#E8F8F2;border:1px solid var(--verde);color:#005C3E}
.mv{background:#fff;border-radius:8px;border:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;margin-bottom:7px;padding:11px 13px;position:relative;overflow:hidden}
.mv::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.mv.gasto::before{background:var(--rojo)}
.mv.venta::before{background:var(--verde)}
.mv.consig::before{background:var(--naranja)}
.mv.tarea-mv::before{background:var(--lavanda)}
.mv.del{opacity:.5;border-style:dashed}
.mv-badge{min-width:46px;padding:3px 5px;border-radius:4px;text-align:center;font-size:8.5px;font-weight:700;flex-shrink:0;margin-top:2px}
.mv-info{flex:1;min-width:0}
.mv-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mv-name.strk{text-decoration:line-through;color:var(--muted)}
.mv-meta{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.4}
.mv-del-meta{font-size:10px;color:var(--rojo);margin-top:2px;font-style:italic}
.mv-right{text-align:right;flex-shrink:0}
.mv-amt{font-size:14px;font-weight:700}
.mv-amt.gasto-c{color:var(--rojo)}
.mv-amt.venta-c{color:var(--verde)}
.mv-amt.strk{text-decoration:line-through;color:var(--muted)}
.mv-actions{display:flex;gap:3px;justify-content:flex-end;margin-top:3px}
.badge-p{background:var(--menta);color:var(--bosque)}
.badge-r{background:var(--lavanda);color:#fff}
.badge-m{background:var(--border);color:var(--bosque)}
.badge-v{background:rgba(0,168,120,.15);color:var(--verde);border:1px solid rgba(0,168,120,.3)}
.badge-u{background:rgba(243,241,234,1);color:var(--muted);border:1px solid var(--border)}
.badge-c{background:rgba(255,152,0,.15);color:var(--naranja);border:1px solid rgba(255,152,0,.3)}
.badge-t{background:rgba(179,140,255,.15);color:var(--lavanda);border:1px solid rgba(179,140,255,.3)}
.filters{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.fb{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--ff);background:transparent;color:var(--muted)}
.fb.on{background:var(--bosque);color:var(--hueso);border-color:var(--bosque)}
.search-bar{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--bosque);font-family:var(--ff);margin-bottom:10px}
.search-bar:focus{outline:none;border-color:var(--bosque)}
.socio-card{border-radius:10px;padding:14px 16px;margin-bottom:10px}
.sc-bosque{background:var(--bosque)}
.sc-light{background:#fff;border:1px solid var(--border)}
.sc-name{font-size:12px;font-weight:700;letter-spacing:.1em;margin-bottom:8px}
.sc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.08)}
.sc-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.sc-lbl{opacity:.6}
.sc-val{font-weight:700}
.balance-card{border-radius:10px;padding:14px 16px;margin-bottom:12px;text-align:center}
.balance-eq{background:#E8F8F2;border:1px solid var(--verde)}
.balance-diff{background:#FFF3CD;border:1px solid var(--naranja)}
.dolar-row{display:flex;align-items:center;gap:8px;padding:10px;background:var(--bosque);border-radius:8px;margin-bottom:12px}
.dolar-lbl{font-size:9px;color:rgba(243,241,234,.5);letter-spacing:.1em}
.dolar-val{font-size:18px;font-weight:700;color:var(--menta)}
.dolar-sub{font-size:9px;color:rgba(243,241,234,.35);margin-top:1px}
.caja-hero{text-align:center;padding:20px;background:var(--bosque);border-radius:10px;margin-bottom:12px}
.caja-amt{font-size:42px;font-weight:700;color:#fff;line-height:1}
.caja-usd-big{font-size:14px;color:rgba(243,241,234,.45);margin-top:6px}
.runway-badge{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.08em}
.rw-green{background:rgba(0,168,120,.2);color:var(--verde)}
.rw-orange{background:rgba(255,152,0,.2);color:var(--naranja)}
.rw-red{background:rgba(226,75,74,.2);color:var(--rojo)}
.mes-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mes-box{border-radius:8px;padding:12px;text-align:center}
.mes-i{background:rgba(0,168,120,.08);border:1px solid rgba(0,168,120,.2)}
.mes-g{background:rgba(226,75,74,.08);border:1px solid rgba(226,75,74,.2)}
.mes-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.mes-val{font-size:18px;font-weight:700}
.prod-sku{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.prod-hp{background:var(--menta);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.prod-hr{background:var(--lavanda);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.prod-body{padding:12px 14px}
.ing-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.ing-name{flex:1;font-size:11.5px;color:var(--bosque);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pct-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.pct-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--hueso);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:var(--ff);line-height:1}
.pct-v{min-width:34px;text-align:center;font-size:12px;font-weight:700}
.ml-v{min-width:44px;text-align:right;font-size:10px;color:var(--muted)}
.form-total{display:flex;justify-content:space-between;padding-top:7px;margin-top:3px;border-top:1px solid var(--border);font-size:12px;font-weight:700}
.t-ok{color:var(--verde)}
.t-warn{color:var(--rojo)}
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.slider-lbl{font-size:11px;color:var(--bosque);min-width:85px}
.pvp-slider{flex:1;accent-color:var(--bosque)}
.slider-v{min-width:32px;text-align:right;font-size:12px;font-weight:700}
.pvp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.pvp-l{background:var(--hueso);border-radius:7px;padding:10px;text-align:center;border:1px solid var(--border)}
.pvp-d{background:var(--bosque);border-radius:7px;padding:10px;text-align:center}
.pvp-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.pvp-val{font-size:15px;font-weight:700}
.fab{position:fixed;bottom:22px;right:18px;width:54px;height:54px;border-radius:50%;background:var(--bosque);color:var(--menta);border:none;font-size:28px;cursor:pointer;font-family:var(--ff);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:200;line-height:1}
.qe-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end}
.qe-modal{background:var(--hueso);border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
.qe-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--bosque);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.qe-type-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.qe-type-btn{padding:16px 8px;border-radius:10px;border:2px solid var(--border);background:#fff;cursor:pointer;text-align:center;font-family:var(--ff)}
.qe-type-btn.sel-g{border-color:var(--rojo);background:rgba(226,75,74,.06)}
.qe-type-btn.sel-v{border-color:var(--verde);background:rgba(0,168,120,.06)}
.qe-type-icon{font-size:22px;margin-bottom:4px}
.qe-type-lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.big-inp{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:28px;font-weight:700;text-align:center;background:#fff;color:var(--bosque);font-family:var(--ff);margin-bottom:10px}
.big-inp:focus{outline:none;border-color:var(--bosque)}
.expand-link{font-size:11px;color:var(--muted);text-align:center;display:block;padding:6px;cursor:pointer;text-decoration:underline;margin-bottom:8px}
.del-sep{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--rojo);padding:8px 0 5px;opacity:.6}
.prog-row{margin-bottom:7px}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.prog-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fp{height:100%;background:var(--menta);border-radius:3px;transition:width .5s}
.prog-fr{height:100%;background:var(--lavanda);border-radius:3px;transition:width .5s}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--hueso)}
.login-brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
.login-brand-t{letter-spacing:.5em;font-size:22px;font-weight:700;color:var(--bosque);text-indent:.5em}
.login-brand-s{font-size:8px;color:var(--muted);letter-spacing:.2em;text-indent:.2em;margin-top:2px}
.login-card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:24px 20px;width:100%;max-width:340px}
.login-t{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--bosque);margin-bottom:4px;text-align:center}
.login-s{font-size:12px;color:var(--muted);margin-bottom:18px;text-align:center;line-height:1.5}
.login-btn{width:100%;padding:12px;background:var(--bosque);color:var(--menta);border:none;border-radius:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;cursor:pointer;font-family:var(--ff)}
.login-back{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--ff);text-decoration:underline;display:block;text-align:center;margin-top:12px;width:100%}
.login-slots{font-size:11px;color:var(--muted);text-align:center;margin-top:12px;background:var(--hueso);border-radius:7px;padding:8px}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;background:var(--hueso)}
.loading-t{font-size:10px;letter-spacing:.2em;opacity:.3;text-transform:uppercase}
.hrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.note-box{font-size:11px;color:var(--muted);text-align:center;line-height:1.7;background:#fff;border-radius:8px;padding:10px;border:1px solid var(--border);margin-bottom:12px}
.cc-inp{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:20px;font-weight:700;color:var(--bosque);background:var(--hueso);text-align:center;font-family:var(--ff);margin-bottom:10px}
.cc-inp:focus{outline:none;border-color:var(--bosque)}
.cc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cb-l{background:var(--hueso);border-radius:7px;padding:10px;text-align:center}
.cb-d{background:var(--bosque);border-radius:7px;padding:10px;text-align:center}
.cb-lbl{font-size:9px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.08em}
.cb-val{font-size:16px;font-weight:700;color:var(--bosque)}
.cb-valw{font-size:16px;font-weight:700;color:#fff}
hr.sep{border:none;border-top:1px solid var(--border);margin:12px 0}
.stock-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px;margin-bottom:10px}
.stock-sku-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stock-sku-name{font-size:13px;font-weight:700;letter-spacing:.12em}
.stock-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stock-inp-wrap{display:flex;flex-direction:column}
.stock-inp{width:100%;padding:8px;border:1px solid var(--border);border-radius:7px;font-size:18px;font-weight:700;text-align:center;background:var(--hueso);color:var(--bosque);font-family:var(--ff)}
.stock-inp:focus{outline:none;border-color:var(--bosque)}
.stock-auto{background:var(--hueso);border-radius:7px;padding:8px;text-align:center;border:1px solid var(--border)}
.stock-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.stock-val{font-size:18px;font-weight:700;color:var(--bosque)}
.stock-bar-wrap{margin-bottom:10px}
.stock-bar-lbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.stock-bar-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.stock-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.stock-alerta{border-radius:7px;padding:8px 10px;font-size:11px;font-weight:600;text-align:center;margin-top:6px}
.alerta-ok{background:rgba(0,168,120,.1);color:var(--verde);border:1px solid rgba(0,168,120,.25)}
.alerta-warn{background:rgba(255,152,0,.1);color:var(--naranja);border:1px solid rgba(255,152,0,.25)}
.alerta-crit{background:rgba(226,75,74,.1);color:var(--rojo);border:1px solid rgba(226,75,74,.25)}
.ing-need-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.ing-need-row:last-child{border-bottom:none}
.pie-legend{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0}
.pie-leg-row{display:flex;align-items:center;gap:6px}
.pie-leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.pie-leg-nm{flex:1;font-size:11px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pie-leg-val{font-size:11px;font-weight:600;color:var(--bosque);flex-shrink:0}
/* CONSIGNACION */
.cs-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.cs-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--naranja)}
.cs-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cs-name{font-size:14px;font-weight:700}
.cs-resp{font-size:10px;color:var(--muted);margin-top:2px}
.cs-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;background:rgba(255,152,0,.15);color:var(--naranja);border:1px solid rgba(255,152,0,.3)}
.cs-badge.cs-vencida{background:rgba(226,75,74,.15);color:var(--rojo);border-color:rgba(226,75,74,.3)}
.cs-badge.cs-ok{background:rgba(0,168,120,.15);color:var(--verde);border-color:rgba(0,168,120,.3)}
.cs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.cs-stat{text-align:center;background:var(--hueso);border-radius:6px;padding:6px 4px}
.cs-stat-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px}
.cs-stat-val{font-size:14px;font-weight:700}
.cs-actions{display:flex;gap:6px}
.cs-btn{flex:1;padding:7px;border-radius:7px;border:1px solid var(--border);background:var(--hueso);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--ff);text-align:center}
.cs-btn.cs-btn-liq{background:var(--verde);color:#fff;border-color:var(--verde)}
.cs-btn.cs-btn-del{background:none;color:var(--rojo);border-color:rgba(226,75,74,.3)}
/* TAREAS */
.tarea-item{background:#fff;border-radius:8px;border:1px solid var(--border);padding:12px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px}
.tarea-item.done{opacity:.55}
.tarea-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;background:#fff}
.tarea-check.checked{background:var(--menta);border-color:var(--menta)}
.tarea-body{flex:1;min-width:0}
.tarea-txt{font-size:13px;font-weight:600;line-height:1.3}
.tarea-txt.strk{text-decoration:line-through;color:var(--muted)}
.tarea-meta{font-size:10px;color:var(--muted);margin-top:3px}
.tarea-resp{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;background:var(--hueso);border:1px solid var(--border);margin-top:4px}
.tarea-del{background:none;border:none;color:var(--border);font-size:15px;cursor:pointer;padding:2px;flex-shrink:0}
/* PILOTO BANNER */
.piloto-banner{background:var(--bosque);border-radius:10px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.piloto-days{font-size:32px;font-weight:700;color:var(--menta);line-height:1;flex-shrink:0}
.piloto-info{flex:1;min-width:0}
.piloto-lbl{font-size:9px;color:rgba(243,241,234,.45);letter-spacing:.12em;text-transform:uppercase}
.piloto-sub{font-size:11px;color:rgba(243,241,234,.6);margin-top:2px}
.piloto-bar{height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin-top:6px;overflow:hidden}
.piloto-bar-fill{height:100%;background:var(--menta);border-radius:2px;transition:width .5s}
/* META VENTAS */
.meta-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.meta-sku-lbl{font-size:11px;font-weight:700;min-width:52px}
.meta-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.meta-fill-p{height:100%;border-radius:4px;background:var(--menta);transition:width .4s}
.meta-fill-r{height:100%;border-radius:4px;background:var(--lavanda);transition:width .4s}
.meta-val{font-size:10px;font-weight:700;min-width:48px;text-align:right}
/* DOLAR EDIT */
.dolar-edit-inp{background:transparent;border:none;border-bottom:1px solid rgba(243,241,234,.3);color:var(--menta);font-size:18px;font-weight:700;font-family:var(--ff);width:90px;text-align:center;padding:2px 0}
.dolar-edit-inp:focus{outline:none;border-bottom-color:var(--menta)}
</style>

<body>
<div id="app"></div>
<button class="fab" id="fab" onclick="openQE()" style="display:none">+</button>
<div id="qe-wrap" style="display:none"></div>

<script>
const BIN='6a2de45af5f4af5e29edc46f';
const KEY='$2a$10$BaKQW5IXbVX9yE1zCXtcZOhGk75QPb40A87BvfOg/ABS/Z46LOUa.';
const API='https://api.jsonbin.io/v3/b/'+BIN;
const BLUELYTICS='https://api.bluelytics.com.ar/v2/latest';
const CATS=['Aceites esenciales','Cristales','Frascos','Etiquetas','Botánica','Exhibidor','Instrumentos','Logística','Otros'];
const CANALES=['Venta directa','Feria','Consignación cobrada','Online'];
const SKUS_V=['POWER','RELAX','Mix'];
const SKUS=['POWER','RELAX','Ambos'];
const CC=['#1F2022','#00E09A','#B38CFF','#3D6B5F','#7A9E95','#C8B89A','#9B8EA0','#B8945F','#AAA'];
const MAX_USERS=3;
const PILOT=50;
const DEF_F={
  POWER:{ml:1.5,ings:[{n:'Menta piperita',p:30},{n:'Naranja dulce',p:25},{n:'Eucalipto',p:20},{n:'Romero',p:15},{n:'Mentol cristal',p:10}]},
  RELAX:{ml:1.5,ings:[{n:'Lavanda',p:45},{n:'Naranja dulce',p:20},{n:'Cedro',p:15},{n:'Bergamota',p:10},{n:'Manzanilla',p:10}]}
};

let CU=null;
let PILOT_START=null;

let S={
  compras:[],ventas:[],aportes:[],retiros:[],consignaciones:[],tareas:[],
  users:{},formulas:JSON.parse(JSON.stringify(DEF_F)),
  precio:{margenP:70,margenR:70,canalP:40,canalR:40,pvpP:7000,pvpR:7000},
  config:{dolarBlue:1100,dolarUpd:'',metaP:50,metaR:50,pilotoStart:''},
  unitsP:50,unitsR:50,
  stock:{POWER:{producidos:0,enStock:0,minimo:5,producirProx:25},RELAX:{producidos:0,enStock:0,minimo:5,producirProx:25}},
  tab:'inicio',showForm:false,formTipo:'gasto',editId:null,prodSku:'POWER',
  filterMv:'todo',search:'',loading:true,saving:false,syncErr:false,lastSync:null,err:''
};
let LS={step:'username',u:'',p:'',c:'',err:''};
let QE={show:false,tipo:null,monto:'',who:'',cat:'Otros',canal:'Venta directa',sku:'POWER',unds:'',nota:'',exp:false,err:''};
let charts={pie:null,week:null,monthly:null,catPie:null};

// Auto-Logout Timer (5 min)
let idleTime=0;
function resetIdleTimer(){idleTime=0;}
document.addEventListener('mousemove',resetIdleTimer);
document.addEventListener('keypress',resetIdleTimer);
document.addEventListener('touchstart',resetIdleTimer);
document.addEventListener('scroll',resetIdleTimer);
setInterval(()=>{idleTime++;if(idleTime>=5&&CU)logout(true);},60000);

// ── API ──────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const r=await fetch(API+'/latest',{headers:{'X-Access-Key':KEY}});
    const d=await r.json();
    if(d.record){
      S.compras=(d.record.compras||[]).map(c=>({deleted:false,deletedAt:null,deletedBy:null,pagador:c.user||null,...c}));
      S.ventas=(d.record.ventas||[]).map(v=>({deleted:false,deletedAt:null,deletedBy:null,...v}));
      S.aportes=d.record.aportes||[];
      S.retiros=d.record.retiros||[];
      S.consignaciones=d.record.consignaciones||[];
      S.tareas=d.record.tareas||[];
      S.users=d.record.users||{};
      S.formulas=d.record.formulas||JSON.parse(JSON.stringify(DEF_F));
      S.precio=d.record.precio||S.precio;
      S.config={...S.config,...(d.record.config||{})};
      S.unitsP=d.record.unitsP||50;S.unitsR=d.record.unitsR||50;
      S.stock=d.record.stock||{POWER:{producidos:0,enStock:0,minimo:5,producirProx:25},RELAX:{producidos:0,enStock:0,minimo:5,producirProx:25}};
      S.lastSync=new Date();S.syncErr=false;
    }
  }catch(e){console.error(e);S.syncErr=true;}
  S.loading=false;
  if(CU&&!S.users[CU]){CU=null;localStorage.removeItem('peak_user');}
  if(!QE.who&&CU)QE.who=CU;
  fetchDolar();
  render();
}

async function saveData(){
  S.saving=true;syncLbl();
  try{
    await fetch(API,{method:'PUT',
      headers:{'Content-Type':'application/json','X-Access-Key':KEY,'X-Bin-Versioning':'false'},
      body:JSON.stringify({compras:S.compras,ventas:S.ventas,aportes:S.aportes,retiros:S.retiros,consignaciones:S.consignaciones,tareas:S.tareas,users:S.users,formulas:S.formulas,precio:S.precio,config:S.config,unitsP:S.unitsP,unitsR:S.unitsR,stock:S.stock})
    });
    S.lastSync=new Date();S.syncErr=false;
  }catch(e){console.error(e);S.syncErr=true;}
  S.saving=false;syncLbl();
}

async function fetchDolar(){
  try{
    const r=await fetch(BLUELYTICS);
    const d=await r.json();
    S.config.dolarBlue=Math.round(d.blue.value_avg);
    S.config.dolarUpd=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    saveData();updateDolarDisplay();
  }catch(e){}
}

function syncLbl(){
  const el=document.getElementById('sl');if(!el)return;
  if(S.saving)el.innerHTML='<span class="dot"></span>GUARDANDO...';
  else if(S.syncErr)el.innerHTML='<span class="dot dot-err"></span><span class="sync-err">ERROR AL GUARDAR — REINTENTANDO</span>';
  else if(S.lastSync)el.textContent='SYNC '+S.lastSync.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}
function updateDolarDisplay(){const el=document.getElementById('dolar-hdr');if(el)el.textContent='≈ USD '+(S.config.dolarBlue>0?Math.round(calcCaja()/S.config.dolarBlue).toLocaleString('es-AR'):'—');}

// ── HELPERS ──────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const fmt=n=>new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n||0);
const fmtN=n=>new Intl.NumberFormat('es-AR',{maximumFractionDigits:0}).format(n||0);
const LOGO=(c,s=32)=>`<svg width="${s}" height="${s*1.05}" viewBox="0 0 100 105" fill="none"><path d="M8 98L50 8L92 98" stroke="${c}" stroke-width="9.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="50" cy="61" r="7.5" fill="${c}"/></svg>`;
const active=()=>S.compras.filter(c=>!c.deleted);
const activeV=()=>S.ventas.filter(v=>!v.deleted);
const parseFecha=f=>{if(!f)return new Date();const p=f.split('/');return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));};
const getUniq=field=>[...new Set([...active().map(c=>c[field]),...activeV().map(v=>v[field])].filter(Boolean))];
const todayStr=()=>new Date().toLocaleDateString('es-AR');

function diasDesdeInicio(){
  if(!S.config.pilotoStart)return null;
  const inicio=parseFecha(S.config.pilotoStart);
  const hoy=new Date();
  return Math.floor((hoy-inicio)/(1000*60*60*24));
}

function calc(){
  const activeAll=active();
  const aT=activeAll.filter(c=>c.sku==='Ambos').reduce((s,c)=>s+c.monto,0);
  const tP=activeAll.filter(c=>c.sku==='POWER').reduce((s,c)=>s+c.monto,0)+aT*.5;
  const tR=activeAll.filter(c=>c.sku==='RELAX').reduce((s,c)=>s+c.monto,0)+aT*.5;
  const actPrice=activeAll.filter(c=>c.cat!=='Otros');
  const aT_p=actPrice.filter(c=>c.sku==='Ambos').reduce((s,c)=>s+c.monto,0);
  const tP_p=actPrice.filter(c=>c.sku==='POWER').reduce((s,c)=>s+c.monto,0)+aT_p*.5;
  const tR_p=actPrice.filter(c=>c.sku==='RELAX').reduce((s,c)=>s+c.monto,0)+aT_p*.5;
  return{aT,tP,tR,tA:activeAll.reduce((s,c)=>s+c.monto,0),cpP:S.unitsP>0?tP/S.unitsP:0,cpR:S.unitsR>0?tR/S.unitsR:0,cpP_price:S.unitsP>0?tP_p/S.unitsP:0,cpR_price:S.unitsR>0?tR_p/S.unitsR:0};
}

function calcCaja(){
  const gastos=active().reduce((s,c)=>s+c.monto,0);
  const ventas=activeV().reduce((s,v)=>s+v.monto,0);
  const aportes=S.aportes.reduce((s,a)=>s+a.monto,0);
  const retiros=S.retiros.reduce((s,r)=>s+r.monto,0);
  return aportes+ventas-gastos-retiros;
}

function calcCajaReal(){
  // Caja real = caja total menos lo que está en consignación sin cobrar
  const enConsig=S.consignaciones.filter(c=>c.estado==='activa').reduce((s,c)=>s+(c.valorEstimado||0),0);
  return{real:calcCaja(),enConsig};
}

function calcRunway(){
  const now=new Date();const d30=new Date(now.getTime()-30*24*60*60*1000);
  const burn=active().filter(c=>parseFecha(c.fecha)>=d30).reduce((s,c)=>s+c.monto,0);
  if(!burn)return 999;
  return Math.max(0,Math.floor(calcCaja()/(burn/30)));
}

function calcMargen(){
  const vv=activeV();if(!vv.length)return null;
  const{cpP,cpR}=calc();
  let tv=0,tc=0;
  vv.forEach(v=>{tv+=v.monto;const u=v.unidades||0;const cpu=v.sku==='POWER'?cpP:v.sku==='RELAX'?cpR:(cpP+cpR)/2;tc+=cpu*u;});
  return tv>0?Math.round((tv-tc)/tv*100):null;
}

function calcCapital(){
  const users=Object.keys(S.users);
  const res={};
  users.forEach(u=>{
    const comp=active().filter(c=>(c.pagador||c.user)===u).reduce((s,c)=>s+c.monto,0);
    const apo=S.aportes.filter(a=>a.user===u).reduce((s,a)=>s+a.monto,0);
    const ret=S.retiros.filter(r=>r.user===u).reduce((s,r)=>s+r.monto,0);
    res[u]={comp,apo,ret,total:comp+apo-ret};
  });
  const sum=Object.values(res).reduce((s,r)=>s+r.total,0);
  const fair=users.length>0?sum/users.length:0;
  Object.keys(res).forEach(u=>{res[u].fair=fair;res[u].balance=res[u].total-fair;});
  return res;
}

function getMesActual(){
  const now=new Date();const mes=now.getMonth(),anio=now.getFullYear();
  const ingresosMes=activeV().filter(v=>{const d=parseFecha(v.fecha);return d.getMonth()===mes&&d.getFullYear()===anio;}).reduce((s,v)=>s+v.monto,0);
  const gastosMes=active().filter(c=>{const d=parseFecha(c.fecha);return d.getMonth()===mes&&d.getFullYear()===anio;}).reduce((s,c)=>s+c.monto,0);
  return{ingresosMes,gastosMes};
}

function getWeekly(){
  const weeks={};
  const all=[...active().map(c=>({...c,tipo:'g'})),...activeV().map(v=>({...v,tipo:'v'}))];
  all.forEach(item=>{
    const d=parseFecha(item.fecha);const mon=new Date(d);mon.setDate(d.getDate()-((d.getDay()+6)%7));
    const key=`${String(mon.getDate()).padStart(2,'0')}/${String(mon.getMonth()+1).padStart(2,'0')}`;
    if(!weeks[key])weeks[key]={g:0,v:0};
    if(item.tipo==='g')weeks[key].g+=item.monto;else weeks[key].v+=item.monto;
  });
  const sorted=Object.entries(weeks).sort((a,b)=>parseFecha('01/'+a[0].split('/')[1]+'/2026')-parseFecha('01/'+b[0].split('/')[1]+'/2026')||parseInt(a[0])-parseInt(b[0]));
  return{labels:sorted.slice(-8).map(w=>'Sem '+w[0]),gastos:sorted.slice(-8).map(w=>w[1].g),ventas:sorted.slice(-8).map(w=>w[1].v)};
}

function formulaAlerts(){
  return['POWER','RELAX'].map(sk=>{const t=S.formulas[sk].ings.reduce((s,i)=>s+i.p,0);return t!==100?{sk,t}:null;}).filter(Boolean);
}

function stockAlerts(){
  const alerts=[];
  ['POWER','RELAX'].forEach(sk=>{const st=S.stock[sk];if(st.enStock<=0)alerts.push({sk,level:'crit',msg:`Sin stock ${sk}`});else if(st.enStock<st.minimo)alerts.push({sk,level:'warn',msg:`Stock bajo en ${sk}: ${st.enStock} potes`});});
  return alerts;
}

function consigVencidas(){
  const hoy=new Date();
  return S.consignaciones.filter(c=>{
    if(c.estado!=='activa')return false;
    const d=parseFecha(c.fecha);
    const dias=Math.floor((hoy-d)/(1000*60*60*24));
    return dias>30;
  });
}

function runwayClass(days){return days>60?'rw-green':days>30?'rw-orange':'rw-red';}
function pvpCalc(cpu,margen,canal){const d=1-(margen/100);const pvp=d>0?cpu/d:0;return{pvp,gDir:pvp-cpu,gCon:pvp*(1-canal/100)-cpu};}

function exportCSV(){
  const rows=[['Tipo','Fecha','Descripcion','SKU/Canal','Monto','Quien','Nota']];
  active().forEach(c=>rows.push(['Gasto',c.fecha,c.insumo,c.sku,c.monto,c.pagador||c.user||'',c.nota||'']));
  activeV().forEach(v=>rows.push(['Venta',v.fecha,v.canal||'',v.sku,v.monto,v.cobrador||'',v.nota||'']));
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='peak-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

// ── RENDER ───────────────────────────────────────────────────────────
function render(){
  if(S.loading){$('app').innerHTML=`<div class="loading">${LOGO('#1F2022',48)}<div class="loading-t">Cargando...</div></div>`;return;}
  if(!CU){renderLogin();$('fab').style.display='none';return;}
  const{tA,cpP,cpR,cpP_price,cpR_price}=calc();const caja=calcCaja();const runway=calcRunway();
  const alerts=formulaAlerts();const sAlerts=stockAlerts();const cVenc=consigVencidas();
  const usd=S.config.dolarBlue>0?'≈ USD '+fmtN(caja/S.config.dolarBlue):'';
  $('fab').style.display='flex';
  const tareasPend=S.tareas.filter(t=>!t.done).length;
  $('app').innerHTML=`
    <div class="hdr">
      <div class="hdr-top">${LOGO('#F3F1EA',30)}<div><div class="logo-t">PEAK</div><div class="logo-s">RESPIRÁ · ACTIVÁ · RENDÍ</div></div>
        <div class="hdr-caja"><div class="caja-big">${fmt(caja)}</div><div class="caja-usd" id="dolar-hdr">${usd}</div></div></div>
      <div class="hdr-user"><span class="hdr-hi">Hola, <strong>${CU}</strong>${alerts.length+sAlerts.length+cVenc.length>0?` &nbsp;<span style="background:var(--rojo);color:#fff;font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px">${alerts.length+sAlerts.length+cVenc.length} ⚠</span>`:''}</span>
        <div class="hdr-btns"><button class="btn-sm" onclick="fetchDolar()">USD ↻</button><button class="btn-sm" onclick="logout()">Salir</button></div></div>
      <div class="sync-bar"><span id="sl">${S.saving?'<span class="dot"></span>GUARDANDO...':S.syncErr?'<span class="dot dot-err"></span><span class="sync-err">ERROR AL GUARDAR</span>':S.lastSync?'SYNC '+S.lastSync.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}):'—'}</span><button class="btn-sm" style="margin-left:auto" onclick="refresh()">↻</button></div>
    </div>
    <div class="tabs">
      <button class="tab ${S.tab==='inicio'?'on':''}" onclick="goTab('inicio')">Inicio</button>
      <button class="tab ${S.tab==='movimientos'?'on':''}" onclick="goTab('movimientos')">Movim.</button>
      <button class="tab ${S.tab==='caja'?'on':''}" onclick="goTab('caja')">Caja</button>
      <button class="tab ${S.tab==='produccion'?'on':''}" onclick="goTab('produccion')">Prod.</button>
      <button class="tab ${S.tab==='consig'?'on':''}" onclick="goTab('consig')">Consig.</button>
      <button class="tab ${S.tab==='tareas'?'on':''}" onclick="goTab('tareas')">${tareasPend>0?`Tareas <span style="background:var(--lavanda);color:#fff;font-size:8px;padding:1px 5px;border-radius:8px;font-weight:700">${tareasPend}</span>`:'Tareas'}</button>
      <button class="tab ${S.tab==='socios'?'on':''}" onclick="goTab('socios')">Socios</button>
    </div>
    <div class="content">
      ${S.tab==='inicio'?inicioHTML(caja,runway,alerts,sAlerts,cVenc,cpP,cpR):''}
      ${S.tab==='movimientos'?movimientosHTML():''}
      ${S.tab==='caja'?cajaHTML(caja,runway):''}
      ${S.tab==='produccion'?produccionHTML(cpP,cpR,cpP_price,cpR_price):''}
      ${S.tab==='consig'?consigHTML():''}
      ${S.tab==='tareas'?tareasHTML():''}
      ${S.tab==='socios'?sociosHTML():''}
    </div>`;

function renderLogin(){
  const uc=Object.keys(S.users).length;let inner='';
  if(LS.step==='u'){inner=`<div class="login-t">Bienvenido</div><div class="login-s">Ingresá tu nombre de usuario</div>${LS.err?`<div class="err">${LS.err}</div>`:''}<label class="flbl">Usuario</label><input class="finp" id="l-u" value="${LS.u}" placeholder="Tu nombre" oninput="LS.u=this.value" onkeydown="if(event.key==='Enter')lS1()"><button class="login-btn" onclick="lS1()">Continuar →</button><div class="login-slots">Socios registrados: <strong>${uc}/${MAX_USERS}</strong></div>`;}
  else if(LS.step==='p'){inner=`<div class="login-t">Hola, ${LS.u}</div><div class="login-s">Ingresá tu contraseña</div>${LS.err?`<div class="err">${LS.err}</div>`:''}<label class="flbl">Contraseña</label><input class="finp" id="l-p" type="password" placeholder="••••••••" oninput="LS.p=this.value" onkeydown="if(event.key==='Enter')lS2()"><button class="login-btn" onclick="lS2()">Entrar →</button><button class="login-back" onclick="LS.step='u';LS.err='';render()">← Volver</button>`;}
  else if(LS.step==='r'){inner=`<div class="login-t">Primera vez</div><div class="login-s">Hola <strong>${LS.u}</strong>, elegí tu contraseña</div>${LS.err?`<div class="err">${LS.err}</div>`:''}<label class="flbl">Contraseña</label><input class="finp" id="l-p" type="password" placeholder="Mínimo 4 caracteres" oninput="LS.p=this.value"><label class="flbl">Confirmar</label><input class="finp" id="l-c" type="password" placeholder="Repetí" oninput="LS.c=this.value" onkeydown="if(event.key==='Enter')doReg()"><button class="login-btn" onclick="doReg()">Registrarme →</button><button class="login-back" onclick="LS.step='u';LS.err='';render()">← Volver</button>`;}
  else{inner=`<div style="text-align:center;padding:10px 0"><div style="font-size:30px;margin-bottom:10px">🔒</div><div style="font-size:14px;font-weight:600;margin-bottom:6px">Sistema completo</div><div style="font-size:12px;color:var(--muted)">Ya hay ${MAX_USERS} socios registrados.</div></div><button class="login-back" onclick="LS.step='u';LS.err='';render()">← Volver</button>`;}
  $('app').innerHTML=`<div class="login-wrap"><div class="login-brand">${LOGO('#1F2022',30)}<div><div class="login-brand-t">PEAK</div><div class="login-brand-s">RESPIRÁ · ACTIVÁ · RENDÍ</div></div></div><div class="login-card">${inner}</div></div>`;
}
function lS1(){const u=LS.u.trim();if(!u){LS.err='Ingresá tu usuario';render();return;}LS.err='';if(S.users[u])LS.step='p';else if(Object.keys(S.users).length>=MAX_USERS)LS.step='f';else LS.step='r';render();setTimeout(()=>{const e=$('l-p')||$('l-u');if(e)e.focus();},80);}
function lS2(){if(!LS.p){LS.err='Ingresá tu contraseña';render();return;}if(S.users[LS.u]&&S.users[LS.u].password===LS.p){CU=LS.u;localStorage.setItem('peak_user',CU);QE.who=CU;LS={step:'u',u:'',p:'',c:'',err:''};resetIdleTimer();render();}else{LS.err='Contraseña incorrecta';render();}}
function doReg(){if(LS.p.length<4){LS.err='Mínimo 4 caracteres';render();return;}if(LS.p!==LS.c){LS.err='No coinciden';render();return;}if(Object.keys(S.users).length>=MAX_USERS){LS.step='f';render();return;}S.users[LS.u.trim()]={password:LS.p,createdAt:new Date().toLocaleDateString('es-AR')};CU=LS.u.trim();localStorage.setItem('peak_user',CU);QE.who=CU;LS={step:'u',u:'',p:'',c:'',err:''};resetIdleTimer();saveData();render();}
function logout(auto=false){
  if(!auto&&!confirm('¿Cerrar sesión?'))return;
  CU=null;localStorage.removeItem('peak_user');
  if(auto)alert('Sesión cerrada automáticamente por inactividad.');
  render();
}

// ── INICIO ───────────────────────────────────────────────────────────
function inicioHTML(caja,runway,alerts,sAlerts,cVenc,cpP,cpR){
  const{ingresosMes,gastosMes}=getMesActual();
  const margen=calcMargen();
  const usd=S.config.dolarBlue>0?fmtN(caja/S.config.dolarBlue):'—';
  const rwClass=runwayClass(runway);

  const alertHTML=[
    ...alerts.map(a=>`<div class="alert alert-w">⚠ Fórmula <strong>${a.sk}</strong>: suma ${a.t}% (debe ser 100%).</div>`),
    ...sAlerts.map(a=>`<div class="alert ${a.level==='crit'?'alert-r':'alert-w'}">📦 ${a.msg}</div>`),
    ...cVenc.map(c=>`<div class="alert alert-w">🕐 <strong>${c.comercio}</strong> — consignación sin liquidar hace más de 30 días.</div>`)
  ].join('');

  // Piloto banner
  const dias=diasDesdeInicio();
  const pilotoBanner=dias!==null?`
    <div class="piloto-banner">
      <div class="piloto-days">${dias}</div>
      <div class="piloto-info">
        <div class="piloto-lbl">Días de piloto</div>
        <div class="piloto-sub">Iniciado el ${S.config.pilotoStart} · ${Math.max(0,30-dias)} días restantes</div>
        <div class="piloto-bar"><div class="piloto-bar-fill" style="width:${Math.min(100,Math.round(dias/30*100))}%"></div></div>
      </div>
    </div>`:`
    <div class="card" style="text-align:center;padding:16px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">¿Cuándo arranca el piloto?</div>

      <button class="btn-save" onclick="setPilotoStart()">Iniciar piloto</button>
    </div>`;

  // Meta ventas
  const vendP=activeV().filter(v=>v.sku==='POWER').reduce((s,v)=>s+(v.unidades||0),0);
  const vendR=activeV().filter(v=>v.sku==='RELAX').reduce((s,v)=>s+(v.unidades||0),0);
  const metaP=S.config.metaP||50;const metaR=S.config.metaR||50;
  const pctMetaP=Math.min(100,Math.round(vendP/metaP*100));

  const metaHTML=`
    <div class="card">
      <div class="card-t">Meta del piloto — unidades</div>
      <div class="meta-row"><div class="meta-sku-lbl" style="color:var(--bosque)">POWER</div><div class="meta-track"><div class="meta-fill-p" style="width:${pctMetaP}%"></div></div><div class="meta-val">${vendP}/${metaP}</div></div>
      <div class="meta-row"><div class="meta-sku-lbl" style="color:var(--lavanda)">RELAX</div><div class="meta-track"><div class="meta-fill-r" style="width:${pctMetaR}%"></div></div><div class="meta-val">${vendR}/${metaR}</div></div>
    </div>`;

  const rec=[...active().slice(0,3).map(c=>({...c,tipo:'g'})),...activeV().slice(0,2).map(v=>({...v,tipo:'v'}))].sort((a,b)=>parseFecha(b.fecha)-parseFecha(a.fecha)).slice(0,4);
  const recHTML=rec.map(item=>item.tipo==='g'
    ?`<div class="mv gasto"><div class="mv-badge badge-${item.sku[0].toLowerCase()}">${item.sku}</div><div class="mv-info"><div class="mv-name">${item.insumo}</div><div class="mv-meta">${item.cat} · ${item.fecha}</div></div><div class="mv-right"><div class="mv-amt gasto-c">${fmt(item.monto)}</div></div></div>`
    :`<div class="mv venta"><div class="mv-badge badge-v">VENTA</div><div class="mv-info"><div class="mv-name">${item.canal||'Venta'}</div><div class="mv-meta">${item.sku} · ${item.fecha}</div></div><div class="mv-right"><div class="mv-amt venta-c">+${fmt(item.monto)}</div></div></div>`
  ).join('');

  // Tareas pendientes en inicio (solo las 3 primeras)
  const tPend=S.tareas.filter(t=>!t.done).slice(0,3);
  const tareasInicio=tPend.length?`
    <div class="card">
      <div class="hrow"><div class="card-t" style="margin-bottom:0">Tareas pendientes</div><button onclick="goTab('tareas')" style="font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--ff)">Ver todas →</button></div>
      <div style="margin-top:10px">${tPend.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)"><span style="width:8px;height:8px;border-radius:50%;background:var(--lavanda);flex-shrink:0"></span><span style="font-size:12px;flex:1">${t.texto}</span><span style="font-size:10px;color:var(--muted)">${t.resp||'—'}</span></div>`).join('')}</div>
    </div>`:'' ;

  return`
    ${alertHTML}
    ${pilotoBanner}
    ${metaHTML}
    <div class="kpi-hero">
      <div class="kpi-hero-lbl">Caja disponible</div>
      <div class="kpi-hero-val">${fmt(caja)}</div>
      <div class="kpi-hero-usd">${S.config.dolarBlue>0?`≈ USD ${usd} (blue $${fmtN(S.config.dolarBlue)})`:''}</div>
      <div class="kpi-hero-runway ${rwClass}">${rwLabel}</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-lbl">Ingresos del mes</div><div class="kpi-val" style="color:var(--verde)">${fmt(ingresosMes)}</div><div class="kpi-sub">${activeV().filter(v=>{const d=parseFecha(v.fecha);return d.getMonth()===new Date().getMonth();}).length} ventas</div></div>
      <div class="kpi"><div class="kpi-lbl">Gastos del mes</div><div class="kpi-val" style="color:var(--rojo)">${fmt(gastosMes)}</div><div class="kpi-sub">${active().filter(c=>{const d=parseFecha(c.fecha);return d.getMonth()===new Date().getMonth();}).length} compras</div></div>
      <div class="kpi"><div class="kpi-lbl">Margen bruto</div><div class="kpi-val">${margen!==null?margen+'%':'—'}</div><div class="kpi-sub">${margen!==null?(margen>60?'✓ Sólido':margen>40?'Aceptable':'Bajo'):'Sin ventas aún'}</div></div>
      <div class="kpi"><div class="kpi-lbl">Costo / pote</div><div class="kpi-val" style="font-size:13px">P: ${fmt(cpP)}<br>R: ${fmt(cpR)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Total gastado</div><div class="kpi-val">${fmt(active().reduce((s,c)=>s+c.monto,0))}</div><div class="kpi-sub">${active().length} registros</div></div>
      <div class="kpi"><div class="kpi-lbl">Total vendido</div><div class="kpi-val" style="color:var(--verde)">${fmt(activeV().reduce((s,v)=>s+v.monto,0))}</div><div class="kpi-sub">${activeV().reduce((s,v)=>s+(v.unidades||0),0)} unidades</div></div>
    </div>
    ${tareasInicio}
    ${rec.length?`<div class="card"><div class="card-t">Últimos movimientos</div>${recHTML}</div>`:''}
    <div class="card"><div class="card-t">Gasto vs venta semanal</div><div style="height:90px"><canvas id="week-c"></canvas></div></div>`;
}

function stockHTML(sk){

        <div class="stock-inp-wrap"><label class="stock-lbl">En stock</label><input class="stock-inp" type="number" min="0" value="${st.enStock}" oninput="setStock('${sk}','enStock',this.value)"></div>
        <div class="stock-auto"><div class="stock-lbl">Vendidos</div><div class="stock-val" style="color:var(--verde)">${vend>0?vend:'—'}</div></div>
        <div class="stock-inp-wrap"><label class="stock-lbl">Mínimo seguridad</label><input class="stock-inp" type="number" min="0" value="${st.minimo}" oninput="setStock('${sk}','minimo',this.value)"></div>
      </div>
      <div class="stock-bar-wrap">

// ── SOCIOS ───────────────────────────────────────────────────────────
function sociosHTML(){
  const cap=calcCapital();const users=Object.keys(cap);
  const totalProyecto=active().reduce((s,c)=>s+c.monto,0)+activeV().reduce((s,v)=>s+v.monto,0);
  const pctSocio=users.length>0?+(100/users.length).toFixed(1):0;
  const pctStr=pctSocio.toString().replace('.',',');
  const socioCards=users.map(u=>{const d=cap[u];const isPos=d.balance>=0;
    // Desglose de gastos por socio
    const gastosDet=active().filter(c=>(c.pagador||c.user)===u).slice(0,3).map(c=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px">${c.insumo}</span><span style="font-weight:600;flex-shrink:0">${fmt(c.monto)}</span></div>`).join('');
    return`<div class="socio-card sc-light">
      <div class="sc-name">${u}</div>
      <div class="sc-row"><span class="sc-lbl">Compras pagadas</span><span class="sc-val">${fmt(d.comp)}</span></div>
      <div class="sc-row"><span class="sc-lbl">Aportes directos</span><span class="sc-val">${fmt(d.apo)}</span></div>
      <div class="sc-row"><span class="sc-lbl">Retiros</span><span class="sc-val" style="color:var(--rojo)">${fmt(d.ret)}</span></div>
      <div class="sc-row" style="font-weight:700"><span>Total aportado</span><span style="color:var(--bosque)">${fmt(d.total)}</span></div>
      <div class="sc-row"><span class="sc-lbl">Parte justa (${pctStr}%)</span><span class="sc-val">${fmt(d.fair)}</span></div>
      <div style="margin-top:6px;padding:8px;border-radius:7px;background:${isPos?'rgba(0,168,120,.1)':'rgba(226,75,74,.1)'};text-align:center;font-size:12px;font-weight:700;color:${isPos?'var(--verde)':'var(--rojo)'}">${isPos?'Aportó de más: '+fmt(d.balance):'Debe aportar: '+fmt(Math.abs(d.balance))}</div>
      ${gastosDet?`<div style="margin-top:8px"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px">Últimos gastos pagados</div>${gastosDet}</div>`:''}
    </div>`;
  }).join('');
  let balanceCard='';
  if(users.length>1){
    const diffs=users.map(u=>({u,b:cap[u].balance})).filter(x=>Math.abs(x.b)>100);
    if(diffs.length>0){
      let txt='';const acres=diffs.filter(x=>x.b>0).sort((a,b)=>b.b-a.b);const deuds=diffs.filter(x=>x.b<0).sort((a,b)=>a.b-b.b);
      let a=0,d=0;
      while(a<acres.length&&d<deuds.length){let monto=Math.min(acres[a].b,Math.abs(deuds[d].b));if(monto>10){txt+=`<div style="margin-top:4px">${deuds[d].u} → ${acres[a].u}: ${fmt(monto)}</div>`;}acres[a].b-=monto;deuds[d].b+=monto;if(acres[a].b<10)a++;if(Math.abs(deuds[d].b)<10)d++;}
      balanceCard=`<div class="balance-card balance-diff"><div style="font-size:12px;font-weight:700;color:var(--naranja);margin-bottom:6px">Para equilibrar la sociedad:</div><div style="font-size:15px;font-weight:700;color:var(--bosque)">${txt}</div></div>`;
    }else{balanceCard=`<div class="balance-card balance-eq"><div style="font-size:13px;font-weight:700;color:var(--verde)">✓ Inversión equilibrada</div><div style="font-size:11px;color:var(--muted);margin-top:3px">Los socios aportaron proporciones similares.</div></div>`;}
  }
  const showAForm=S.formTipo==='aporte'&&S.showForm;const showRForm=S.formTipo==='retiro'&&S.showForm;
  const aForm=showAForm?`<div class="card"><div class="hrow"><span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.14em">Nuevo aporte</span><button class="btn-x" onclick="closeForm()">×</button></div>${S.err?`<div class="err">${S.err}</div>`:''}<label class="flbl">¿Quién aporta?</label><div class="tbts">${users.map(u=>`<button class="tbt ${(S.form.user||CU)===u?'son':''}" onclick="SF('user','${u}')">${u}</button>`).join('')}</div><label class="flbl">Monto ARS</label><input class="finp" type="number" value="${S.form.monto||''}" placeholder="0" oninput="SF('monto',this.value)"><label class="flbl">Nota</label><input class="finp" value="${S.form.nota||''}" placeholder="Ej: Depósito inicial" oninput="SF('nota',this.value)"><button class="btn-save" onclick="saveAporte()">Guardar aporte</button></div>`:''
  const rForm=showRForm?`<div class="card"><div class="hrow"><span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.14em">Nuevo retiro</span><button class="btn-x" onclick="closeForm()">×</button></div>${S.err?`<div class="err">${S.err}</div>`:''}<label class="flbl">¿Quién retira?</label><div class="tbts">${users.map(u=>`<button class="tbt ${(S.form.user||CU)===u?'son':''}" onclick="SF('user','${u}')">${u}</button>`).join('')}</div><label class="flbl">Monto ARS</label><input class="finp" type="number" value="${S.form.monto||''}" placeholder="0" oninput="SF('monto',this.value)"><label class="flbl">Motivo</label><input class="finp" value="${S.form.nota||''}" placeholder="Ej: Retiro personal" oninput="SF('nota',this.value)"><button class="btn-save" onclick="saveRetiro()">Guardar retiro</button></div>`:''
  const apList=S.aportes.slice().reverse().map(a=>`<div class="mv venta"><div class="mv-badge badge-v">APORTE</div><div class="mv-info"><div class="mv-name">${a.user}</div><div class="mv-meta">${a.fecha}${a.nota?' · '+a.nota:''}</div></div><div class="mv-right"><div class="mv-amt venta-c">+${fmt(a.monto)}</div></div></div>`).join('');
  const retList=S.retiros.slice().reverse().map(r=>`<div class="mv gasto"><div class="mv-badge badge-u">RETIRO</div><div class="mv-info"><div class="mv-name">${r.user}</div><div class="mv-meta">${r.fecha}${r.nota?' · '+r.nota:''}</div></div><div class="mv-right"><div class="mv-amt gasto-c">${fmt(r.monto)}</div></div></div>`).join('');
  return`
    ${!showAForm&&!showRForm?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <button class="btn-add" style="margin-bottom:0;background:var(--verde);font-size:11px" onclick="openForm('aporte')">+ Registrar aporte</button>
      <button class="btn-add" style="margin-bottom:0;background:var(--rojo);font-size:11px" onclick="openForm('retiro')">− Registrar retiro</button>
    </div>`:''}
    ${aForm}${rForm}
    ${balanceCard}
    ${socioCards}
    ${S.aportes.length?`<div class="card"><div class="card-t">Aportes directos</div>${apList}</div>`:''}
    ${S.retiros.length?`<div class="card"><div class="card-t">Retiros</div>${retList}</div>`:''}
    <div class="note-box">Total proyecto: ${fmt(totalProyecto)} · Aporte justo (33,3%): ${fmt(Object.values(cap)[0]?.fair||0)} c/u</div>`;
}

// ── CHARTS ───────────────────────────────────────────────────────────
function initCharts(){
  Object.keys(charts).forEach(k=>{if(charts[k]){charts[k].destroy();charts[k]=null;}});
  const{labels,gastos,ventas}=getWeekly();
  const we=$('week-c')||$('weekly-chart');
  if(we&&labels.length){charts.week=new Chart(we,{type:'bar',data:{labels,datasets:[{label:'Gastos',data:gastos,backgroundColor:'rgba(226,75,74,.7)',borderRadius:3,borderSkipped:false},{label:'Ventas',data:ventas,backgroundColor:'rgba(0,168,120,.7)',borderRadius:3,borderSkipped:false}]},options:{plugins:{legend:{display:true,labels:{font:{family:"'Montserrat',sans-serif",size:10},boxWidth:10}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.raw)}}},scales:{x:{grid:{display:false},ticks:{font:{family:"'Montserrat',sans-serif",size:9},color:'#8A8880'}},y:{display:false}},responsive:true,maintainAspectRatio:false}});}
  const cats2=CATS.map((n,i)=>{const t=active().filter(c=>c.cat===n).reduce((s,c)=>s+c.monto,0);return t>0?{n,t,c:CC[i]}:null;}).filter(Boolean);
  const cp=$('cat-pie');
  if(cp&&cats2.length){const total2=cats2.reduce((s,d)=>s+d.t,0);charts.catPie=new Chart(cp,{type:'doughnut',data:{labels:cats2.map(d=>d.n),datasets:[{data:cats2.map(d=>d.t),backgroundColor:cats2.map(d=>d.c),borderWidth:2,borderColor:'#fff'}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)} (${Math.round(ctx.raw/total2*100)}%)`}}},cutout:'58%',responsive:true,maintainAspectRatio:false}});}
}

// ── QUICK ENTRY ──────────────────────────────────────────────────────
function openQE(){
  QE={show:true,tipo:null,monto:'',who:CU,cat:'Otros',canal:'',sku:'POWER',unds:'',nota:'',exp:false,err:''};
  renderQE();
}
function renderQE(){
  const users=Object.keys(S.users);
  if(!QE.show){$('qe-wrap').style.display='none';return;}
  $('qe-wrap').style.display='block';
  const inner=QE.tipo===null?`
    <div class="qe-title">Cargá rápido <button class="btn-x" onclick="closeQE()">×</button></div>
    <div class="qe-type-btns">
      <div class="qe-type-btn ${QE.tipo==='g'?'sel-g':''}" onclick="QE.tipo='g';renderQE()"><div class="qe-type-icon">📤</div><div class="qe-type-lbl" style="color:var(--rojo)">Gasto</div></div>
      <div class="qe-type-btn ${QE.tipo==='v'?'sel-v':''}" onclick="QE.tipo='v';renderQE()"><div class="qe-type-icon">📥</div><div class="qe-type-lbl" style="color:var(--verde)">Venta</div></div>
    </div>`
  :QE.tipo==='g'?`
    <div class="qe-title">Gasto rápido <button class="btn-x" onclick="closeQE()">×</button></div>
    ${QE.err?`<div class="err">${QE.err}</div>`:''}
    <input class="big-inp" type="number" placeholder="$ monto" value="${QE.monto}" oninput="QE.monto=this.value" autofocus>
    <label class="flbl">¿Quién pagó?</label><div class="tbts" style="margin-bottom:10px">${users.map(u=>`<button class="tbt ${QE.who===u?'son':''}" onclick="QE.who='${u}';renderQE()">${u}</button>`).join('')}</div>
    ${QE.exp?`<label class="flbl">Categoría</label><select class="finp" onchange="QE.cat=this.value">${CATS.map(c=>`<option ${QE.cat===c?'selected':''}>${c}</option>`).join('')}</select><label class="flbl">Nota</label><input class="finp" value="${QE.nota}" oninput="QE.nota=this.value" placeholder="Opcional">`:`<span class="expand-link" onclick="QE.exp=true;renderQE()">+ más campos</span>`}
    <button class="btn-save" onclick="saveQEGasto()">Guardar gasto</button>
    <button class="login-back" onclick="QE.tipo=null;renderQE()">← Volver</button>`
  :`
    <div class="qe-title">Venta rápida <button class="btn-x" onclick="closeQE()">×</button></div>
    ${QE.err?`<div class="err">${QE.err}</div>`:''}
    <input class="big-inp" type="number" placeholder="$ cobrado" value="${QE.monto}" oninput="QE.monto=this.value" autofocus>
    <label class="flbl">SKU</label><div class="tbts" style="margin-bottom:10px">${SKUS_V.map(s=>`<button class="tbt ${s==='POWER'&&QE.sku===s?'sp':s==='RELAX'&&QE.sku===s?'sr':s==='Mix'&&QE.sku===s?'sa':''}" onclick="QE.sku='${s}';renderQE()">${s}</button>`).join('')}</div>
    <label class="flbl">¿Quién cobró?</label><div class="tbts" style="margin-bottom:10px">${users.map(u=>`<button class="tbt ${QE.who===u?'son':''}" onclick="QE.who='${u}';renderQE()">${u}</button>`).join('')}</div>
    ${QE.exp?`<label class="flbl">Canal</label><input class="finp" value="${QE.canal}" oninput="QE.canal=this.value" placeholder="Ej: Feria Quilmes"><label class="flbl">Unidades</label><input class="finp" type="number" value="${QE.unds}" oninput="QE.unds=this.value" placeholder="0"><label class="flbl">Nota</label><input class="finp" value="${QE.nota}" oninput="QE.nota=this.value" placeholder="Opcional">`:`<span class="expand-link" onclick="QE.exp=true;renderQE()">+ más campos</span>`}
    <button class="btn-save" style="background:var(--verde)" onclick="saveQEVenta()">Guardar venta</button>
    <button class="login-back" onclick="QE.tipo=null;renderQE()">← Volver</button>`;
  $('qe-wrap').innerHTML=`<div class="qe-overlay" onclick="if(event.target===this)closeQE()"><div class="qe-modal">${inner}</div></div>`;
}
function closeQE(){
  if((QE.monto||QE.nota)&&QE.tipo!==null){if(!confirm('¿Cerrar sin guardar?'))return;}
  QE.show=false;$('qe-wrap').style.display='none';
}
function saveQEGasto(){
  if(!QE.monto||isNaN(parseFloat(QE.monto))){QE.err='Ingresá el monto';renderQE();return;}
  S.compras.unshift({id:Date.now(),fecha:todayStr(),insumo:'Gasto rápido',sku:'Ambos',cat:QE.cat,monto:parseFloat(QE.monto),proveedor:'',nota:QE.nota,user:CU,pagador:QE.who,deleted:false,deletedAt:null,deletedBy:null});
  closeQE();saveData();render();
}
function saveQEVenta(){
  if(!QE.monto||isNaN(parseFloat(QE.monto))){QE.err='Ingresá el monto';renderQE();return;}
  S.ventas.unshift({id:Date.now(),fecha:todayStr(),canal:QE.canal||'Venta rápida',sku:QE.sku,unidades:parseInt(QE.unds)||0,monto:parseFloat(QE.monto),cobrador:QE.who,nota:QE.nota,user:CU,deleted:false,deletedAt:null,deletedBy:null});
  closeQE();saveData();render();
}

// ── EVENTS ───────────────────────────────────────────────────────────
function goTab(t){S.tab=t;S.showForm=false;S.editId=null;S.form={};S.err='';render();}
function openForm(tipo){S.showForm=true;S.formTipo=tipo;S.editId=null;S.form={sku:'POWER',cat:'Otros',pagador:CU,cobrador:CU,responsable:CU,user:CU,resp:''};S.err='';render();}
function closeForm(){S.showForm=false;S.editId=null;S.form={};S.err='';render();}
function SF(k,v){S.form[k]=v;if(['sku','pagador','cobrador','user','resp','responsable'].includes(k))render();}
function refresh(){S.loading=true;render();loadData();}
function setDolarManual(v){S.config.dolarBlue=parseInt(v)||0;updateDolarDisplay();clearTimeout(window._dt);window._dt=setTimeout(saveData,1500);}

function saveGasto(){
  if(!(S.form.insumo||'').trim()){S.err='Ingresá el insumo';render();return;}
  if(!S.form.monto||isNaN(parseFloat(S.form.monto))){S.err='Ingresá el monto';render();return;}
  S.err='';
  const fecha=S.form.fecha||todayStr();
  if(S.editId){const i=S.compras.findIndex(c=>c.id===S.editId);if(i>=0)S.compras[i]={...S.compras[i],...S.form,monto:parseFloat(S.form.monto),fecha};S.editId=null;}
  else S.compras.unshift({id:Date.now(),fecha,insumo:S.form.insumo.trim(),sku:S.form.sku||'Ambos',cat:S.form.cat||'Otros',monto:parseFloat(S.form.monto),proveedor:(S.form.proveedor||'').trim(),nota:(S.form.nota||'').trim(),pagador:S.form.pagador||CU,user:CU,deleted:false,deletedAt:null,deletedBy:null});
  closeForm();saveData();
}
function saveVenta(){
  if(!S.form.monto||isNaN(parseFloat(S.form.monto))){S.err='Ingresá el monto';render();return;}
  S.err='';
  const fecha=S.form.fecha||todayStr();
  if(S.editId){const i=S.ventas.findIndex(v=>v.id===S.editId);if(i>=0)S.ventas[i]={...S.ventas[i],...S.form,monto:parseFloat(S.form.monto),unidades:parseInt(S.form.unidades)||0,fecha};S.editId=null;}
  else S.ventas.unshift({id:Date.now(),fecha,canal:(S.form.canal||'Venta').trim(),sku:S.form.sku||'POWER',unidades:parseInt(S.form.unidades)||0,monto:parseFloat(S.form.monto),cobrador:S.form.cobrador||CU,nota:(S.form.nota||'').trim(),user:CU,deleted:false,deletedAt:null,deletedBy:null});
  closeForm();saveData();
}
function saveAporte(){
  if(!S.form.monto||isNaN(parseFloat(S.form.monto))){S.err='Ingresá el monto';render();return;}
  S.aportes.unshift({id:Date.now(),fecha:todayStr(),user:S.form.user||CU,monto:parseFloat(S.form.monto),nota:(S.form.nota||'').trim()});
  closeForm();saveData();
}
function saveRetiro(){
  if(!S.form.monto||isNaN(parseFloat(S.form.monto))){S.err='Ingresá el monto';render();return;}
  S.retiros.unshift({id:Date.now(),fecha:todayStr(),user:S.form.user||CU,monto:parseFloat(S.form.monto),nota:(S.form.nota||'').trim()});
  closeForm();saveData();
}
function saveConsig(){
  if(!(S.form.comercio||'').trim()){S.err='Ingresá el nombre del comercio';render();return;}
  S.consignaciones.unshift({id:Date.now(),fecha:todayStr(),comercio:S.form.comercio.trim(),sku:S.form.sku||'POWER',unidades:parseInt(S.form.unidades)||0,valorEstimado:parseFloat(S.form.valorEstimado)||0,responsable:S.form.responsable||CU,nota:(S.form.nota||'').trim(),estado:'activa'});
  closeForm();saveData();
}
function saveTarea(){
  if(!(S.form.texto||'').trim()){S.err='Escribí la tarea';render();return;}
  S.tareas.unshift({id:Date.now(),fecha:todayStr(),texto:S.form.texto.trim(),resp:S.form.resp||'',creadoPor:CU,done:false});
  closeForm();saveData();
}
function toggleTarea(id){
  const t=S.tareas.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;
  saveData();render();
}
function delTarea(id){
  if(!confirm('¿Eliminar tarea?'))return;
  S.tareas=S.tareas.filter(x=>x.id!==id);saveData();render();
}
function liquidarConsig(id){
  if(!confirm('¿Marcar como liquidada?'))return;
  const c=S.consignaciones.find(x=>x.id===id);if(!c)return;
  c.estado='liquidada';
  // Registrar como venta automáticamente
  if(c.valorEstimado>0)S.ventas.unshift({id:Date.now(),fecha:todayStr(),canal:c.comercio+' (consig.)',sku:c.sku,unidades:c.unidades,monto:c.valorEstimado,cobrador:CU,nota:'Liquidación consignación',user:CU,deleted:false,deletedAt:null,deletedBy:null});
  saveData();render();
}
function retirarConsig(id){
  if(!confirm('¿Retirar mercadería de este punto?'))return;
  const c=S.consignaciones.find(x=>x.id===id);if(!c)return;
  c.estado='retirada';saveData();render();
}
function delConsig(id){if(!confirm('¿Eliminar?'))return;S.consignaciones=S.consignaciones.filter(x=>x.id!==id);saveData();render();}
function delGasto(id){if(!confirm('¿Eliminar?'))return;const i=S.compras.findIndex(c=>c.id===id);if(i>=0)S.compras[i]={...S.compras[i],deleted:true,deletedAt:todayStr(),deletedBy:CU};render();saveData();}
function delVenta(id){if(!confirm('¿Eliminar?'))return;const i=S.ventas.findIndex(v=>v.id===id);if(i>=0)S.ventas[i]={...S.ventas[i],deleted:true,deletedAt:todayStr(),deletedBy:CU};render();saveData();}
function editGasto(id){const c=S.compras.find(x=>x.id===id);if(!c)return;S.editId=id;S.form={...c};S.showForm=true;S.formTipo='gasto';render();}
function editVenta(id){const v=S.ventas.find(x=>x.id===id);if(!v)return;S.editId=id;S.form={...v};S.showForm=true;S.formTipo='venta';render();}
function dupGasto(id){const c=S.compras.find(x=>x.id===id);if(!c)return;S.form={...c};S.showForm=true;S.formTipo='gasto';S.editId=null;render();}

function setU(sku,val){const v=Math.max(1,parseInt(val)||1);if(sku==='P')S.unitsP=v;else S.unitsR=v;const{cpP_price,cpR_price}=calc();const ep=$('cpu-p'),er=$('cpu-r');if(sku==='P'&&ep)ep.textContent=fmt(cpP_price);if(sku==='R'&&er)er.textContent=fmt(cpR_price);clearTimeout(window._st);window._st=setTimeout(saveData,1500);}
function adjP(sk,idx,d){const ing=S.formulas[sk].ings[idx];ing.p=Math.max(0,Math.min(100,ing.p+d));render();clearTimeout(window._ft);window._ft=setTimeout(saveData,1500);}
function setML(sk,val){S.formulas[sk].ml=Math.max(0.1,parseFloat(val)||0.1);clearTimeout(window._mt);window._mt=setTimeout(saveData,1500);}
function setPrec(k,v,sk){
  S.precio[k]=parseInt(v);
  const isP=sk==='POWER';
  const{cpP_price,cpR_price}=calc();
  const cpu=isP?cpP_price:cpR_price;
  const pvp=pvpCalc(cpu,S.precio[isP?'margenP':'margenR'],S.precio[isP?'canalP':'canalR']);
  const elPvp=$('pvp-val-'+sk),elGdir=$('gdir-val-'+sk),elGcon=$('gcon-val-'+sk),elCanal=$('lbl-canal-'+sk);
  if(elPvp)elPvp.innerHTML=fmt(pvp.pvp);
  if(elGdir)elGdir.innerHTML=fmt(pvp.gDir);
  if(elGcon)elGcon.innerHTML=fmt(pvp.gCon)+'<span style="font-size:10px;color:var(--muted)"> /pote</span>';
  if(elCanal&&(k==='canalP'||k==='canalR'))elCanal.innerText=v;
  clearTimeout(window._pt);window._pt=setTimeout(saveData,1500);
}
function setStock(sku,field,val){
  const v=Math.max(0,parseFloat(val)||0);
  S.stock[sku][field]=v;
  clearTimeout(window._skt);window._skt=setTimeout(saveData,1500);
}

loadData();
</script>
